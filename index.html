/* ═══ Date helpers: local-time safe ═══ */
const pad2=n=>String(n).padStart(2,"0");
const toLocalDateObj=d=>new Date(String(d).replace(" ","T"));
const parseLocalDateKey=k=>{
  const [y,m,dd]=k.split("-").map(Number);
  return new Date(y,m-1,dd);
};
const nowLocalISO=()=>{
  const d=new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
};
const localDateKey=d=>{
  const dt=toLocalDateObj(d);
  return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;
};
const localMonthKey=d=>{
  const dt=toLocalDateObj(d);
  return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}`;
};
const fmtDate=d=>{
  if(!d)return"";
  const dt=toLocalDateObj(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
};
const fmtHour=v=>{
  if(v===null||v===undefined||v==="")return"";
  const n=parseFloat(v);
  return Number.isFinite(n)?n.toFixed(1):"";
};
const getWeekKey=d=>{
  const dt=toLocalDateObj(d);
  const day=dt.getDay();
  const m=new Date(dt);
  m.setDate(dt.getDate()-((day+6)%7));
  return`${m.getFullYear()}-${pad2(m.getMonth()+1)}-${pad2(m.getDate())}`;
};
const getMonthKey=d=>localMonthKey(d);

/* ═══ Period helpers ═══ */
const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;};
const thisWeekStart=()=>{const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7));return`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;};
const thisMonthKey=()=>{const d=new Date();return`${d.getFullYear()}-${pad2(d.getMonth()+1)}`;};
const isInPeriod=(cd,period)=>{
  if(!cd)return false;
  if(period==="today")return localDateKey(cd)===todayKey();
  if(period==="this week")return getWeekKey(cd)===thisWeekStart();
  if(period==="this month")return localMonthKey(cd)===thisMonthKey();
  return false;
};

/* ═══ Helpers ═══ */
const mkRef=(tid,sid)=>sid?`${tid}::${sid}`:tid;
const parseRef=ref=>{const p=ref.split("::");return{taskId:p[0],subtaskId:p[1]||null}};

const maxTtd=subs=>{
  if(!subs||!subs.length)return"";
  let mx=-1;
  subs.forEach(s=>{
    const v=TTD_ORD[s.timeToDo||""]??3;
    if(v>mx)mx=v;
  });
  return mx===3?"":TTD[mx];
};
const sumReqTime=subs=>{
  if(!subs||!subs.length)return"";
  let sum=0,any=false;
  subs.forEach(s=>{
    if(s.requiredTime!==""&&s.requiredTime!==null&&s.requiredTime!==undefined){
      const n=parseFloat(s.requiredTime);
      if(Number.isFinite(n)){sum+=n;any=true;}
    }
  });
  return any?String(Math.round(sum*100)/100):"";
};
const sumRequiredTime=items=>{
  let sum=0;
  items.forEach(it=>{
    const n=parseFloat(it.requiredTime);
    if(Number.isFinite(n))sum+=n;
  });
  return (Math.round(sum*10)/10).toFixed(1);
};
const taskIsComplete=task=>{
  if(task.subtasks&&task.subtasks.length>0)return task.subtasks.every(s=>!!s.completedDate);
  return !!task.completedDate;
};
const taskCompletedDate=task=>{
  if(task.subtasks&&task.subtasks.length>0){
    if(!task.subtasks.every(s=>s.completedDate))return null;
    return task.subtasks.reduce((mx,s)=>(!mx||new Date(s.completedDate)>new Date(mx))?s.completedDate:mx,null);
  }
  return task.completedDate;
};
const effective=task=>{
  if(task.subtasks&&task.subtasks.length>0){
    return{
      ...task,
      requiredTime:sumReqTime(task.subtasks),
      timeToDo:maxTtd(task.subtasks),
      completedDate:taskCompletedDate(task)
    };
  }
  return task;
};

const buildTodoItems=tasks=>{
  const items=[];
  tasks.forEach(t=>{
    if(t.subtasks&&t.subtasks.length>0){
      t.subtasks.forEach(s=>{
        items.push({
          ref:mkRef(t.id,s.id),
          taskId:t.id,
          subtaskId:s.id,
          displayName:`${t.name}  |  ${s.name}`,
          name:s.name,
          taskName:t.name,
          importance:t.importance,
          urgency:t.urgency,
          deadline:t.deadline,
          project:t.project,
          requiredTime:s.requiredTime,
          timeToDo:s.timeToDo||"",
          completedDate:s.completedDate
        });
      });
    }else{
      items.push({
        ref:t.id,
        taskId:t.id,
        subtaskId:null,
        displayName:t.name,
        name:t.name,
        taskName:null,
        importance:t.importance,
        urgency:t.urgency,
        deadline:t.deadline,
        project:t.project,
        requiredTime:t.requiredTime,
        timeToDo:t.timeToDo||"",
        completedDate:t.completedDate
      });
    }
  });
  return items;
};

function sortTasks(tasks,by){
  return[...tasks].sort((a,b)=>{
    const ae=effective(a),be=effective(b);
    if(by==="importance")return LVL_ORD[ae.importance]-LVL_ORD[be.importance];
    if(by==="urgency")return LVL_ORD[ae.urgency]-LVL_ORD[be.urgency];
    if(by==="deadline"){
      if(!ae.deadline&&!be.deadline)return 0;
      if(!ae.deadline)return 1;
      if(!be.deadline)return -1;
      return new Date(ae.deadline)-new Date(be.deadline);
    }
    if(by==="project")return(ae.project||"zzz").localeCompare(be.project||"zzz");
    return 0;
  });
}

function groupCompleted(tasks,by){
  const g={};
  tasks.forEach(t=>{
    const cd=taskCompletedDate(t);
    if(!cd)return;
    const key=by==="week"?getWeekKey(cd):getMonthKey(cd);
    if(!g[key])g[key]=[];
    g[key].push(t);
  });
  return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
}
function fmtGroupLabel(key,by){
  if(by==="week"){
    const d=parseLocalDateKey(key);
    const e=new Date(d);
    e.setDate(d.getDate()+6);
    return`${d.getMonth()+1}/${d.getDate()} – ${e.getMonth()+1}/${e.getDate()}, ${d.getFullYear()}`;
  }
  const[y,m]=key.split("-");
  const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return`${M[parseInt(m)-1]} ${y}`;
}

      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">

    );
  }
  if(type==="urgency"){
    return(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M13.5 2.5L4.5 14h7L10 21.5 20 9h-7l.5-6.5z" fill={color}/>
      </svg>
    );
  }
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="8.5" stroke={color} strokeWidth="2.4"/>
      <path d="M12 7v5l3.5 2" stroke={color} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>

}

      fontSize:11,

      width:82,

      whiteSpace:"nowrap"

}

function TimeLabel({value,color="#8a8580"}){

  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,color,fontWeight:500}}>
      <SvgIcon type="time" color={color} size={11}/>

      padding:"12px 14px",

      display:"flex",
      alignItems:"flex-start",
      gap:11,
      opacity:dimmed?.58:1,
      transition:"border-color .15s,opacity .2s"
    }}>
      {showCheck&&<div style={{marginTop:2}}><Checkbox checked={checked} onClick={onCheck}/></div>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:7}}>
          <div style={{
            fontSize:14,
            fontWeight:600,
            color:"#1a1714",
            minWidth:0,
            flex:1,
            textDecoration:dimmed?"line-through":"none",

            fontSize:14,
            fontWeight:600,

            textDecorationColor:"#a09a90"
          }}>
            <span style={{minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.name}</span>
            {hasSubs&&(
              <button onClick={e=>{e.stopPropagation();setExpanded(x=>!x);}} style={{
                background:"none",
                border:"none",
                cursor:"pointer",
                fontSize:18,
                color:"#1a1714",
                padding:"0 3px",
                lineHeight:1,
                transform:expanded?"rotate(90deg)":"rotate(0deg)",

            )}
          </div>

          {eff.deadline&&<span style={{fontSize:11,color:"#8a8580"}}>📅 {fmtDate(eff.deadline)}</span>}
        </div>

      {expanded&&hasSubs&&(

                      }}>
                        <span style={{color:"#1a1714",fontWeight:600}}>{task.name}</span>

/* ═══ Matrix ═══ */
function MatrixView({tasks}){
  const grouped={};

  tasks.forEach(t=>{
    const e=effective(t);
    const x=LVL_VAL[e.importance]??0;
    const y=LVL_VAL[e.urgency]??0;
    const key=`${x},${y}`;
    if(!grouped[key])grouped[key]=[];
    grouped[key].push({task:t,e,x,y});
  });

  const points=[];
  Object.values(grouped).forEach(group=>{
    group.forEach((p,i)=>{
      const center=(group.length-1)/2;
      const labelOffset=(i-center)*20;
      points.push({...p,labelOffset});
    });
  });

  const AxisLabel=({children,style})=>(
    <div style={{
      position:"absolute",
      fontSize:11,
      color:"#8a8580",
      fontWeight:700,
      letterSpacing:.2,
      ...style
    }}>
      {children}
    </div>
  );

  return(
    <div style={{background:"#fff",border:"1px solid #e8e5e0",borderRadius:14,padding:14}}>
      <div style={{
        position:"relative",
        height:360,
        border:"1px solid #e0dcd6",
        borderRadius:12,
        background:"#fafaf8",
        overflow:"hidden"
      }}>
        <div style={{
          position:"absolute",
          left:"50%",
          top:0,
          bottom:0,
          width:1,

function Modal({open,onClose,title,width,children}){

/* ═══ Edit Todo Modal ═══ */
function EditTodoModal({open,onClose,period,tasks,todoLists,todoOrder,onUpdate}){
  const[lists,setLists]=useState({});
  const[orders,setOrders]=useState({});
  const[addOpen,setAddOpen]=useState(true);
  const[addTab,setAddTab]=useState("");
  const[dragIdx,setDragIdx]=useState(null);
  const[dragOver,setDragOver]=useState(null);

  useEffect(()=>{
    setLists({
      today:[...(todoLists.today||[])],
      "this week":[...(todoLists["this week"]||[])],
      "this month":[...(todoLists["this month"]||[])]
    });
    setOrders({
      today:[...(todoOrder.today||[])],
      "this week":[...(todoOrder["this week"]||[])],
      "this month":[...(todoOrder["this month"]||[])]
    });
    setAddOpen(true);
    // default tab for each period
    setAddTab(period==="today"?"today":period==="this week"?"this week":"this month");
  },[open]);

  const allItems=useMemo(()=>buildTodoItems(tasks),[tasks]);
  const currentRefs=lists[period]||[];

  // All available: not in list AND not completed
  const allAvailable=allItems.filter(it=>!currentRefs.includes(it.ref)&&!it.completedDate);

  // Tabs config per period
  const tabsConfig={
    "today":[
      {key:"today",   label:"today",      filter:it=>it.timeToDo==="today"},
      {key:"week",    label:"this week",   filter:it=>it.timeToDo==="this week"},
      {key:"others",  label:"others",      filter:it=>it.timeToDo!=="today"&&it.timeToDo!=="this week"}
    ],
    "this week":[
      {key:"week",    label:"this week",   filter:it=>it.timeToDo==="this week"},
      {key:"month",   label:"this month",  filter:it=>it.timeToDo==="this month"},
      {key:"others",  label:"others",      filter:it=>it.timeToDo!=="this week"&&it.timeToDo!=="this month"}
    ],
    "this month":null
  };
  const tabs=tabsConfig[period];
  const activeTabFilter=tabs?tabs.find(t=>t.key===addTab)?.filter:null;
  const available=activeTabFilter?allAvailable.filter(activeTabFilter):allAvailable;

  const addItem=ref=>{
    const nl={...lists},no={...orders};
    const push=(r,p)=>{
      if(!(nl[p]||[]).includes(r)){
        nl[p]=[...(nl[p]||[]),r];
        no[p]=[...(no[p]||[]),r];
      }
    };
    if(period==="today")["today","this week","this month"].forEach(p=>push(ref,p));
    else if(period==="this week")["this week","this month"].forEach(p=>push(ref,p));
    else push(ref,"this month");
    setLists(nl);
    setOrders(no);
    setAddOpen(false);
  };

  const removeItem=ref=>{
    const nl={...lists},no={...orders};
    const rm=(r,p)=>{
      nl[p]=(nl[p]||[]).filter(i=>i!==r);
      no[p]=(no[p]||[]).filter(i=>i!==r);
    };
    if(period==="this month")["today","this week","this month"].forEach(p=>rm(ref,p));
    else if(period==="this week")["today","this week"].forEach(p=>rm(ref,p));
    else rm(ref,"today");
    setLists(nl);
    setOrders(no);
  };

  const moveItem=(from,to)=>{
    const arr=[...(orders[period]||[])];
    const[item]=arr.splice(from,1);
    arr.splice(to,0,item);
    setOrders({...orders,[period]:arr});
  };

  const orderedRefs=useMemo(()=>{
    const o=(orders[period]||[]).filter(r=>currentRefs.includes(r));
    currentRefs.forEach(r=>{if(!o.includes(r))o.push(r)});
    return o;
  },[orders,currentRefs,period]);

  // Only show non-completed items in the list (completed ones hide automatically)
  const displayRefs=orderedRefs.filter(ref=>{
    const it=allItems.find(x=>x.ref===ref);
    return !it||!it.completedDate;
  });

  const findItem=ref=>allItems.find(it=>it.ref===ref);

  return(
    <Modal open={open} onClose={onClose} title={`Edit — ${period}`} width={500}>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:600,color:"#6b6560"}}>Tasks ({displayRefs.length})</span>
          <button style={{...btnS,padding:"6px 14px",fontSize:12}} onClick={()=>setAddOpen(a=>!a)}>+ Add</button>
        </div>

        {addOpen&&(
          <div style={{border:"1px solid #e8e5e0",borderRadius:10,marginBottom:12,background:"#fafaf8",overflow:"hidden"}}>
            {/* Tabs for today / this week periods */}
            {tabs&&(
              <div style={{display:"flex",borderBottom:"1px solid #e8e5e0",background:"#f5f4f1"}}>
                {tabs.map(t=>(
                  <button key={t.key} onClick={()=>setAddTab(t.key)} style={{
                    flex:1,padding:"7px 4px",fontSize:11,fontWeight:addTab===t.key?700:500,
                    color:addTab===t.key?"#1a1714":"#8a8580",
                    background:addTab===t.key?"#fff":"transparent",
                    border:"none",borderBottom:addTab===t.key?"2px solid #c96442":"2px solid transparent",
                    cursor:"pointer",whiteSpace:"nowrap"
                  }}>{t.label}<span style={{marginLeft:4,fontWeight:400,color:"#b0aaa4",fontSize:10}}>
                    {allAvailable.filter(t.filter).length}
                  </span></button>
                ))}
              </div>
            )}
            <div style={{padding:10,maxHeight:200,overflow:"auto"}}>
              {available.length===0
                ?<div style={{fontSize:13,color:"#a09a90",textAlign:"center",padding:"12px 0"}}>No tasks to add</div>
                :available.map(it=>(
                  <div key={it.ref} onClick={()=>addItem(it.ref)} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f0ece6"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <span style={{color:"#1a1714"}}>{it.displayName}</span>
                    <span style={{fontSize:11,color:"#8a8580"}}>{it.project||""}</span>
                  </div>
                ))}
            </div>
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {displayRefs.map((ref,idx)=>{
            const it=findItem(ref);
            return(
              <div key={ref} draggable
                onDragStart={()=>setDragIdx(idx)}
                onDragOver={e=>{e.preventDefault();setDragOver(idx);}}
                onDrop={()=>{if(dragIdx!=null&&dragIdx!==idx)moveItem(dragIdx,idx);setDragIdx(null);setDragOver(null);}}
                onDragEnd={()=>{setDragIdx(null);setDragOver(null);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:dragOver===idx?"#f5f0ea":"#fff",border:"1px solid #e8e5e0",borderRadius:10,cursor:"grab"}}>
                <span style={{color:"#c4bfb6",fontSize:15,userSelect:"none"}}>⠿</span>
                <span style={{flex:1,fontSize:13,fontWeight:500,color:"#1a1714",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it?it.displayName:ref}</span>
                {it&&it.project&&<span style={{fontSize:11,color:"#8a8580",flexShrink:0}}>{it.project}</span>}
                <button onClick={()=>removeItem(ref)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#c4bfb6",padding:2,flexShrink:0}}>✕</button>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button style={btnS} onClick={onClose}>Cancel</button>
        <button style={btnP} onClick={()=>{onUpdate(lists,orders);onClose();}}>Save</button>
      </div>
    </Modal>
  );
}

/* ═══ Import / Export ═══ */
function ImportExportModal({open,onClose,data,onImport}){
  const[mode,setMode]=useState("export");
  const[text,setText]=useState("");
  const[copied,setCopied]=useState(false);
  const json=JSON.stringify(data,null,2);

  return(
    <Modal open={open} onClose={onClose} title="Import / Export" width={520}>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {["export","import"].map(m=>(
          <button key={m} onClick={()=>setMode(m)} style={{...btnS,padding:"6px 18px",fontSize:13,background:mode===m?"#1a1714":"#f0ece6",color:mode===m?"#fff":"#4a4540"}}>
            {m==="export"?"Export":"Import"}
          </button>
        ))}
      </div>

      {mode==="export"?(
        <>
          <textarea readOnly value={json} style={{...iSt,height:200,resize:"vertical",fontSize:11,fontFamily:"monospace"}}/>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button style={btnP} onClick={()=>{
              navigator.clipboard.writeText(json).then(()=>{
                setCopied(true);
                setTimeout(()=>setCopied(false),2000);
              });
            }}>{copied?"Copied!":"Copy"}</button>
            <button style={btnS} onClick={()=>{
              const a=document.createElement("a");
              a.href="data:application/json;charset=utf-8,"+encodeURIComponent(json);
              a.download="todo-export.json";
              a.click();
            }}>Download</button>
          </div>
        </>
      ):(
        <>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Paste JSON…" style={{...iSt,height:200,resize:"vertical",fontSize:11,fontFamily:"monospace"}}/>
          <button style={{...btnP,marginTop:12,opacity:text.trim()?1:.4}} disabled={!text.trim()} onClick={()=>{
            try{
              const p=JSON.parse(text);
              if(p.tasks&&p.todoLists&&p.todoOrder){
                onImport(p);
                onClose();
              }else alert("格式不正确");
            }catch{
              alert("JSON 解析失败");
            }
          }}>Import</button>
        </>
      )}
    </Modal>
  );
}

/* ═══════════ MAIN APP ═══════════ */
function App(){
  const[data,setData]=useState(()=>load()||defState());
  const[mainTab,setMainTab]=useState("todo");
  const[allSub,setAllSub]=useState("active");
  const[todoSub,setTodoSub]=useState("today");
  const[sortBy,setSortBy]=useState("importance");
  const[showMatrix,setShowMatrix]=useState(false);
  const[compView,setCompView]=useState("week");
  const[showForm,setShowForm]=useState(false);
  const[editTask,setEditTask]=useState(null);
  const[showImport,setShowImport]=useState(false);
  const[showEditTodo,setShowEditTodo]=useState(false);

  /* ── Cloud sync state ── */
  const[syncStatus,setSyncStatus]=useState('init'); // 'init'|'syncing'|'ok'|'err'
  const syncSkip=useRef(1);  // skip the first useEffect trigger (initial render)
  const syncTimer=useRef(null);

  /* ① Save to localStorage on every change (original behavior, unchanged) */
  useEffect(()=>{save(data)},[data]);

  /* ② Debounced push to Supabase on every data change */
  useEffect(()=>{
    if(syncSkip.current>0){syncSkip.current--;return;}
    setSyncStatus('syncing');
    clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(async()=>{
      try{
        const snap={...data,_ts:new Date().toISOString()};
        save(snap);
        await sb.from('todo_state').upsert({id:'singleton',data:snap,updated_at:new Date().toISOString()});
        setSyncStatus('ok');
      }catch(e){
        console.error('Sync error:',e);
        setSyncStatus('err');
      }
    },2000);
  },[data]);

  /* ③ On first load: pull from Supabase if cloud is newer than localStorage */
  useEffect(()=>{
    (async()=>{
      try{
        const{data:row,error}=await sb.from('todo_state')
          .select('data,updated_at').eq('id','singleton').maybeSingle();
        if(!error&&row){
          const local=load();
          const localTs=local?._ts?new Date(local._ts):new Date(0);
          const cloudTs=new Date(row.updated_at);
          if(cloudTs>localTs){
            syncSkip.current++; // don't re-push the data we just pulled
            save(row.data);
            setData(row.data);
            setSyncStatus('ok');
            return;
          }
        }
        setSyncStatus('ok');
      }catch(e){
        console.error('Cloud load error:',e);
        setSyncStatus('err');
      }
    })();
  },[]);

  /* ④ Manual sync: always pull latest from cloud */
  const manualSync=async()=>{
    if(syncStatus==='syncing')return;
    setSyncStatus('syncing');
    try{
      const{data:row,error}=await sb.from('todo_state')
        .select('data,updated_at').eq('id','singleton').maybeSingle();
      if(!error&&row){
        syncSkip.current++;
        save(row.data);
        setData(row.data);
      }
      setSyncStatus('ok');
    }catch(e){
      console.error('Manual sync error:',e);
      setSyncStatus('err');
    }
  };
  const update=fn=>setData(d=>({...d,...fn(d)}));

  const syncRefs=(oldTask,newTask,lists,orders)=>{
    const nl={...lists},no={...orders};
    const rm=ref=>["today","this week","this month"].forEach(p=>{
      nl[p]=(nl[p]||[]).filter(r=>r!==ref);
      no[p]=(no[p]||[]).filter(r=>r!==ref);
    });
    const add=(ref,ttd)=>{
      const push=(r,p)=>{
        if(!(nl[p]||[]).includes(r)){
          nl[p]=[...(nl[p]||[]),r];
          no[p]=[...(no[p]||[]),r];
        }
      };
      if(ttd==="today")["today","this week","this month"].forEach(p=>push(ref,p));
      else if(ttd==="this week")["this week","this month"].forEach(p=>push(ref,p));
      else if(ttd==="this month")push(ref,"this month");
    };

    if(oldTask){
      if(oldTask.subtasks&&oldTask.subtasks.length>0)oldTask.subtasks.forEach(s=>rm(mkRef(oldTask.id,s.id)));
      else rm(oldTask.id);
    }

    if(newTask.subtasks&&newTask.subtasks.length>0){
      newTask.subtasks.forEach(s=>{
        if(!s.completedDate)add(mkRef(newTask.id,s.id),s.timeToDo||"");
      });
    }else{
      if(!newTask.completedDate)add(newTask.id,newTask.timeToDo||"");
    }

    return{todoLists:nl,todoOrder:no};
  };

  const saveTask=form=>{
    update(d=>{
      const tasks=[...d.tasks];
      let lists={
        today:[...(d.todoLists.today||[])],
        "this week":[...(d.todoLists["this week"]||[])],
        "this month":[...(d.todoLists["this month"]||[])]
      };
      let orders={
        today:[...(d.todoOrder.today||[])],
        "this week":[...(d.todoOrder["this week"]||[])],
        "this month":[...(d.todoOrder["this month"]||[])]
      };
      let oldTask=null;

      if(form.id){
        const idx=tasks.findIndex(t=>t.id===form.id);
        if(idx>=0){
          oldTask={...tasks[idx],subtasks:tasks[idx].subtasks?tasks[idx].subtasks.map(s=>({...s})):[]};
          let cd=form.completedDate;
          if(form.subtasks&&form.subtasks.length>0){
            const allDone=form.subtasks.every(s=>!!s.completedDate);
            cd=allDone?(cd||nowLocalISO()):null;
          }
          tasks[idx]={...form,completedDate:cd};
        }
      }else{
        const id=uid();
        form={...form,id,completedDate:null};
        tasks.push(form);
      }

      const nt=tasks.find(t=>t.id===form.id);
      const s=syncRefs(oldTask,nt,lists,orders);
      return{tasks,...s};
    });

    setShowForm(false);
    setEditTask(null);
  };

  const deleteTask=id=>{
    update(d=>{
      const t=d.tasks.find(x=>x.id===id);
      const nl={...d.todoLists},no={...d.todoOrder};
      const rm=ref=>["today","this week","this month"].forEach(p=>{
        nl[p]=(nl[p]||[]).filter(r=>r!==ref);
        no[p]=(no[p]||[]).filter(r=>r!==ref);
      });

      if(t){
        if(t.subtasks&&t.subtasks.length>0)t.subtasks.forEach(s=>rm(mkRef(id,s.id)));
        else rm(id);
      }

      return{tasks:d.tasks.filter(x=>x.id!==id),todoLists:nl,todoOrder:no};
    });

    setShowForm(false);
    setEditTask(null);
  };

  const toggleRef=ref=>{
    const{taskId,subtaskId}=parseRef(ref);
    update(d=>({tasks:d.tasks.map(t=>{
      if(t.id!==taskId)return t;
      if(subtaskId){
        const subs=(t.subtasks||[]).map(s=>s.id===subtaskId
          ?(s.completedDate?{...s,completedDate:null}:{...s,completedDate:nowLocalISO()})
          :s
        );
        const allDone=subs.every(s=>!!s.completedDate);
        return{...t,subtasks:subs,completedDate:allDone?nowLocalISO():null};
      }
      return t.completedDate?{...t,completedDate:null}:{...t,completedDate:nowLocalISO()};
    })}));
  };

  const toggleSubAll=(taskId,subId)=>{
    update(d=>({tasks:d.tasks.map(t=>{
      if(t.id!==taskId)return t;
      const subs=(t.subtasks||[]).map(s=>s.id===subId
        ?(s.completedDate?{...s,completedDate:null}:{...s,completedDate:nowLocalISO()})
        :s
      );
      const allDone=subs.every(s=>!!s.completedDate);
      return{...t,subtasks:subs,completedDate:allDone?nowLocalISO():null};
    })}));
  };

  const getTodoItems=period=>{
    const{tasks,todoLists,todoOrder}=data;
    const ids=todoLists[period]||[];
    const ord=todoOrder[period]||[];
    let ordered;

    if(period==="this week"){
      const t=(todoOrder["today"]||[]).filter(r=>ids.includes(r));
      ordered=[...t,...ord.filter(r=>!t.includes(r)&&ids.includes(r))];
    }else if(period==="this month"){
      const w=(todoOrder["this week"]||[]).filter(r=>ids.includes(r));
      const t=(todoOrder["today"]||[]).filter(r=>w.includes(r));
      const wOnly=w.filter(r=>!t.includes(r));
      ordered=[...t,...wOnly,...ord.filter(r=>!w.includes(r)&&ids.includes(r))];
    }else{
      ordered=ord.filter(r=>ids.includes(r));
    }

    ids.forEach(r=>{if(!ordered.includes(r))ordered.push(r)});
    const all=buildTodoItems(tasks);
    return ordered.map(ref=>{
      const it=all.find(x=>x.ref===ref);
      return it?{...it,_ref:ref}:null;
    }).filter(Boolean);
  };

  const{tasks,todoLists,todoOrder}=data;
  const activeTasks=tasks.filter(t=>!taskIsComplete(t));
  const completedTasks=tasks.filter(t=>taskIsComplete(t));

  return(
    <div style={{maxWidth:640,margin:"0 auto",minHeight:"100vh",background:"#fafaf8",position:"relative",paddingBottom:80}}>
      <div style={{padding:"18px 20px 0",display:"flex",borderBottom:"1px solid #e8e5e0",position:"sticky",top:0,background:"#fafaf8",zIndex:50,alignItems:"flex-end"}}>
        <div style={{display:"flex",flex:1}}>
        {[["todo","To do"],["all","All tasks"]].map(([tab,label])=>(
          <button key={tab} onClick={()=>setMainTab(tab)} style={{
            background:"none",
            border:"none",
            borderBottom:mainTab===tab?"2.5px solid #c96442":"2.5px solid transparent",
            padding:"7px 20px 11px",
            fontSize:15,
            fontWeight:mainTab===tab?700:500,
            color:mainTab===tab?"#1a1714":"#9a9590",
            cursor:"pointer"
          }}>{label}</button>
        ))}
        </div>
        {/* Sync button */}
        <button onClick={manualSync} disabled={syncStatus==='syncing'}
          title={syncStatus==='ok'?'已同步，点击手动同步':syncStatus==='syncing'?'同步中…':syncStatus==='err'?'同步失败，点击重试':'点击同步'}
          style={{
            marginBottom:10,marginRight:2,
            display:"flex",alignItems:"center",gap:3,
            fontSize:11,fontWeight:600,
            color:syncStatus==='ok'?'#4f9460':syncStatus==='err'?'#d94f3d':'#c49a2a',
            background:"none",border:"none",
            cursor:syncStatus==='syncing'?'default':'pointer',
            padding:"2px 6px",borderRadius:6,
            opacity:syncStatus==='syncing'?0.7:1,
            transition:"color .3s"
          }}>
          <span style={{
            fontSize:14,display:"inline-block",lineHeight:1,
            animation:syncStatus==='syncing'?'spin .8s linear infinite':'none'
          }}>↻</span>
          <span>{syncStatus==='syncing'?'syncing…':syncStatus==='err'?'error':'synced'}</span>
        </button>
      </div>

      {/* ═══ TO DO ═══ */}
      {mainTab==="todo"&&(
        <div>
          <div style={{padding:"12px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",gap:6}}>
              {TTD.map(t=><Pill key={t} active={todoSub===t} onClick={()=>setTodoSub(t)}>{t}</Pill>)}
            </div>
            <button onClick={()=>setShowEditTodo(true)} style={{background:"none",border:"1px solid #e0dcd6",borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:600,color:"#6b6560",cursor:"pointer"}}>
              Edit
            </button>
          </div>

          <div style={{padding:"14px 20px"}}>
            {(()=>{
              const items=getTodoItems(todoSub);
              const pending=items.filter(it=>!it.completedDate);
              const done=items.filter(it=>it.completedDate&&isInPeriod(it.completedDate,todoSub));

              if(!pending.length&&!done.length)return(
                <div style={{textAlign:"center",padding:"52px 20px",color:"#b0aaa4"}}>
                  <div style={{fontSize:36,marginBottom:10}}>✨</div>
                  <div style={{fontSize:14,fontWeight:500}}>No tasks for {todoSub}</div>
                  <div style={{fontSize:12,marginTop:4}}>Click Edit to add tasks</div>
                </div>
              );

              return(
                <>
                  {pending.length>0&&(
                    <div style={{marginBottom:22}}>
                      <SectionLabel count={`${pending.length} · ${sumRequiredTime(pending)}h`}>Pending</SectionLabel>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {pending.map(it=>(
                          <TodoCard key={it._ref} item={it} showCheck checked={false}
                            onCheck={()=>toggleRef(it._ref)}
                            onClick={()=>{const t=tasks.find(x=>x.id===it.taskId);if(t){setEditTask(t);setShowForm(true);}}}/>
                        ))}
                      </div>
                    </div>
                  )}

                  {done.length>0&&(
                    <div>
                      <SectionLabel count={`${done.length} · ${sumRequiredTime(done)}h`}>Completed</SectionLabel>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {done.map(it=>(
                          <TodoCard key={it._ref} item={it} showCheck checked dimmed
                            onCheck={()=>toggleRef(it._ref)}
                            onClick={()=>{const t=tasks.find(x=>x.id===it.taskId);if(t){setEditTask(t);setShowForm(true);}}}/>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              );
            })()}
          </div>
        </div>
      )}

      {/* ═══ ALL TASKS ═══ */}
      {mainTab==="all"&&(
        <div>
          <div style={{padding:"12px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",gap:6}}>
              <Pill active={allSub==="active"} onClick={()=>setAllSub("active")}>Active</Pill>
              <Pill active={allSub==="completed"} onClick={()=>setAllSub("completed")}>Completed</Pill>
            </div>
            <button onClick={()=>setShowImport(true)} style={{background:"none",border:"1px solid #e0dcd6",borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:600,color:"#6b6560",cursor:"pointer"}}>
              Import / Export
            </button>
          </div>

          <div style={{padding:"14px 20px"}}>
            {allSub==="active"&&(
              <>
                <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#a09a90",marginRight:2}}>Sort:</span>
                  {["importance","urgency","deadline","project"].map(s=>(
                    <button key={s} onClick={()=>{setSortBy(s);setShowMatrix(false);}} style={{
                      background:sortBy===s&&!showMatrix?"#e8e0d6":"transparent",
                      border:"1px solid",
                      borderColor:sortBy===s&&!showMatrix?"#cfc8be":"#e8e5e0",
                      borderRadius:99,
                      padding:"4px 10px",
                      fontSize:11,
                      fontWeight:500,
                      color:sortBy===s&&!showMatrix?"#4a4540":"#8a8580",
                      cursor:"pointer"
                    }}>{s}</button>
                  ))}
                  <button onClick={()=>setShowMatrix(v=>!v)} style={{
                    marginLeft:"auto",
                    background:showMatrix?"#1a1714":"#edeae4",
                    color:showMatrix?"#fff":"#6b6560",
                    border:"none",
                    borderRadius:99,
                    padding:"5px 12px",
                    fontSize:11,
                    fontWeight:700,
                    cursor:"pointer"
                  }}>Matrix</button>
                </div>

                {activeTasks.length===0
                  ?(
                    <div style={{textAlign:"center",padding:"52px 20px",color:"#b0aaa4"}}>
                      <div style={{fontSize:36,marginBottom:10}}>📋</div>
                      <div style={{fontSize:14,fontWeight:500}}>No active tasks</div>
                    </div>
                  )
                  :showMatrix
                    ?<MatrixView tasks={activeTasks}/>
                    :sortBy==="project"
                      ?(
                        ()=>{
                          const grouped={};
                          sortTasks(activeTasks,"project").forEach(t=>{
                            const k=effective(t).project||"No Project";
                            if(!grouped[k])grouped[k]=[];
                            grouped[k].push(t);
                          });
                          return Object.entries(grouped).map(([project,items])=>(
                            <div key={project} style={{marginBottom:22}}>
                              <SectionLabel count={items.length}>{project}</SectionLabel>
                              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                                {items.map(t=>(
                                  <AllTaskCard key={t.id} task={t} onEdit={t=>{setEditTask(t);setShowForm(true);}} onToggleSub={toggleSubAll}/>
                                ))}
                              </div>
                            </div>
                          ));
                        }
                      )()
                      :(
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {sortTasks(activeTasks,sortBy).map(t=>(
                            <AllTaskCard key={t.id} task={t} onEdit={t=>{setEditTask(t);setShowForm(true);}} onToggleSub={toggleSubAll}/>
                          ))}
                        </div>
                      )
                }
              </>
            )}

            {allSub==="completed"&&(
              <>
                <div style={{display:"flex",gap:5,marginBottom:14}}>
                  {["week","month"].map(v=>(
                    <button key={v} onClick={()=>setCompView(v)} style={{
                      background:compView===v?"#e8e0d6":"transparent",
                      border:"1px solid",
                      borderColor:compView===v?"#cfc8be":"#e8e5e0",
                      borderRadius:99,
                      padding:"4px 10px",
                      fontSize:11,
                      fontWeight:500,
                      color:compView===v?"#4a4540":"#8a8580",
                      cursor:"pointer"
                    }}>By {v}</button>
                  ))}
                </div>

                {completedTasks.length===0
                  ?(
                    <div style={{textAlign:"center",padding:"52px 20px",color:"#b0aaa4"}}>
                      <div style={{fontSize:36,marginBottom:10}}>🎉</div>
                      <div style={{fontSize:14,fontWeight:500}}>No completed tasks yet</div>
                    </div>
                  )
                  :groupCompleted(completedTasks,compView).map(([key,items])=>(
                    <div key={key} style={{marginBottom:22}}>
                      <SectionLabel count={items.length}>{fmtGroupLabel(key,compView)}</SectionLabel>
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
                        {items.map(t=>(
                          <AllTaskCard key={t.id} task={t} onEdit={t=>{setEditTask(t);setShowForm(true);}} onToggleSub={toggleSubAll}/>
                        ))}
                      </div>
                    </div>
                  ))
                }
              </>
            )}
          </div>
        </div>
      )}

      {/* FAB */}
      <button onClick={()=>{setEditTask(null);setShowForm(true);}} style={{
        position:"fixed",
        bottom:24,
        right:"max(24px,calc(50% - 296px))",
        width:52,
        height:52,
        borderRadius:16,
        background:"#c96442",
        color:"#fff",
        border:"none",
        fontSize:28,
        cursor:"pointer",
        lineHeight:1,
        boxShadow:"0 4px 20px rgba(201,100,66,.38)",
        display:"flex",
        alignItems:"center",
        justifyContent:"center",
        zIndex:100
      }}>+</button>

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditTask(null);}} title={editTask?"Edit Task":"New Task"} width={480}>
        <TaskForm task={editTask} onSave={saveTask} onDelete={deleteTask} onClose={()=>{setShowForm(false);setEditTask(null);}}/>
      </Modal>

      <EditTodoModal open={showEditTodo} onClose={()=>setShowEditTodo(false)}
        period={todoSub}
        tasks={tasks}
        todoLists={todoLists}
        todoOrder={todoOrder}
        onUpdate={(l,o)=>update(()=>({todoLists:l,todoOrder:o}))}/>

      <ImportExportModal open={showImport} onClose={()=>setShowImport(false)} data={data} onImport={d=>setData(d)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
